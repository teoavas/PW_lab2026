{% extends "base.html" %}

{% block content %}

<h2>Lista prodotti</h2>

<table border="1" cellpadding="5">
    <tr>
        <th>Nome</th>
        <th>Prezzo</th>
        <th>Location</th>
    </tr>

    {% for product in products %}
    <tr>
        <td>{{ product.name }}</td>
        <td>{{ product.price }} €</td>
        <td>{{ product.location }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
